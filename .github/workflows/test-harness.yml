name: test-harness

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq + PyYAML (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y jq python3-yaml

      - name: Install PyYAML (macOS)
        if: matrix.os == 'macos-latest'
        run: pip3 install --break-system-packages pyyaml

      - name: Install Apache Jena (Linux)
        if: matrix.os == 'ubuntu-latest'
        env:
          JENA_VERSION: "5.2.0"
        run: |
          curl -fsSL "https://archive.apache.org/dist/jena/binaries/apache-jena-${JENA_VERSION}.tar.gz" \
            | sudo tar -xz -C /opt
          echo "/opt/apache-jena-${JENA_VERSION}/bin" >> "$GITHUB_PATH"

      - name: Install Apache Jena (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install jena

      - name: Verify dependencies
        run: |
          bash --version | head -1
          jq --version
          git --version
          python3 --version
          python3 -c 'import yaml; print("yaml", yaml.__version__)'
          riot --version | head -1 || true
          arq --version | head -1 || true
          shacl --version | head -1 || true

      - name: Run test harness
        env:
          MVP_TEMPLATE_LOCAL: ${{ github.workspace }}
        run: ./scripts/test-mvp/run.sh
